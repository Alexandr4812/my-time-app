name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Project and Build
        run: |
          cordova create myapp com.example.time TimeApp
          cd myapp
          cordova platform add android
          # Копируем ваш index.html в папку сборки
          cp ../index.html www/index.html
          # Собираем APK
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: TimeConverter-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk

