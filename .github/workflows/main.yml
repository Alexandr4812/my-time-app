name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # Устанавливаем инструмент сборки
          npm install -g @techiediaries/needle
          # Создаем проект из одного HTML
          mkdir release
          # Используем curl для вызова API сборщика или простую обертку
          echo "Сервер пытается собрать файл напрямую..."
          
          # Если этот шаг снова упадет, значит GitHub блокирует установку тяжелых SDK
