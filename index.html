<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер: Москва ↔ Шри-Ланка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 36px 30px;
            backdrop-filter: blur(12px);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .direction-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .dir-btn {
            padding: 9px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
        }

        .dir-btn.active {
            background: rgba(255,210,0,0.15);
            border-color: rgba(255,210,0,0.4);
            color: #ffd200;
        }

        .dir-btn:hover:not(.active) {
            border-color: rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.7);
        }

        .converter-grid {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .conv-side {
            flex: 1;
            min-width: 160px;
        }

        .conv-side label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .conv-side label .flag {
            font-size: 1.1rem;
        }

        .conv-side input[type="time"],
        .conv-side input[type="date"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.25);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.3s;
        }

        .conv-side input:focus {
            border-color: rgba(255,210,0,0.5);
        }

        .conv-side input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .arrow-icon {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.25);
            flex-shrink: 0;
            padding-bottom: 2px;
        }

        .result-box {
            margin-top: 22px;
            padding: 18px 20px;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .result-box .result-time {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd200;
            text-align: center;
        }

        .result-box .result-day {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-top: 4px;
        }

        .result-box .result-detail {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 2px;
        }

        @media (max-width: 480px) {
            .card { padding: 24px 18px; }
            .converter-grid { flex-direction: column; align-items: stretch; }
            .arrow-icon { text-align: center; transform: rotate(90deg); margin: 4px 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🕐 Конвертер времени</h1>
        <p class="subtitle">Москва (UTC+3) ↔ Шри-Ланка (UTC+5:30)</p>

        <div class="direction-toggle">
            <button class="dir-btn active" id="dir-m2s" onclick="setDirection('m2s')">Москва → Шри-Ланка</button>
            <button class="dir-btn" id="dir-s2m" onclick="setDirection('s2m')">Шри-Ланка → Москва</button>
        </div>

        <div class="converter-grid">
            <div class="conv-side">
                <label id="conv-from-label"><span class="flag">🇷🇺</span> Москва</label>
                <input type="time" id="conv-time" value="12:00" onchange="convertTime()">
                <input type="date" id="conv-date" onchange="convertTime()" style="margin-top:8px;">
            </div>
            <div class="arrow-icon">⇄</div>
            <div class="conv-side">
                <label id="conv-to-label"><span class="flag">🇱🇰</span> Шри-Ланка</label>
                <div style="height:46px;"></div>
            </div>
        </div>

        <div class="result-box">
            <div class="result-time" id="conv-result-time">14:30</div>
            <div class="result-day" id="conv-result-day">Тот же день</div>
            <div class="result-detail" id="conv-detail">Разница +2ч 30м</div>
        </div>
    </div>

    <script>
        let direction = 'm2s';

        function padZero(n) {
            return n < 10 ? '0' + n : '' + n;
        }

        function setDirection(dir) {
            direction = dir;
            document.getElementById('dir-m2s').classList.toggle('active', dir === 'm2s');
            document.getElementById('dir-s2m').classList.toggle('active', dir === 's2m');

            const fromLabel = document.getElementById('conv-from-label');
            const toLabel = document.getElementById('conv-to-label');

            if (dir === 'm2s') {
                fromLabel.innerHTML = '<span class="flag">🇷🇺</span> Москва';
                toLabel.innerHTML = '<span class="flag">🇱🇰</span> Шри-Ланка';
            } else {
                fromLabel.innerHTML = '<span class="flag">🇱🇰</span> Шри-Ланка';
                toLabel.innerHTML = '<span class="flag">🇷🇺</span> Москва';
            }
            convertTime();
        }

        function convertTime() {
            const timeInput = document.getElementById('conv-time').value;
            const dateInput = document.getElementById('conv-date').value;

            if (!timeInput) return;

            const [hours, minutes] = timeInput.split(':').map(Number);
            let baseDate;

            if (dateInput) {
                baseDate = new Date(dateInput);
            } else {
                baseDate = new Date();
            }
            baseDate.setHours(hours, minutes, 0, 0);

            let resultDate;
            if (direction === 'm2s') {
                const utc = baseDate.getTime() - 3 * 3600000;
                resultDate = new Date(utc + 5.5 * 3600000);
            } else {
                const utc = baseDate.getTime() - 5.5 * 3600000;
                resultDate = new Date(utc + 3 * 3600000);
            }

            const resultTime = padZero(resultDate.getHours()) + ':' + padZero(resultDate.getMinutes());
            document.getElementById('conv-result-time').textContent = resultTime;

            const baseDay = baseDate.getDate();
            const resultDay = resultDate.getDate();
            const dayDiff = resultDay - baseDay;

            let dayText = 'Тот же день';
            if (dayDiff === 1 || (baseDate.getMonth() !== resultDate.getMonth() && resultDay <= 2)) {
                if (direction === 'm2s') dayText = 'Следующий день →';
                else dayText = '← Предыдущий день';
            } else if (dayDiff === -1) {
                dayText = direction === 'm2s' ? '← Предыдущий день' : 'Следующий день →';
            }

            document.getElementById('conv-result-day').textContent = dayText;

            const diffText = direction === 'm2s' ? 'Разница +2ч 30м' : 'Разница −2ч 30м';
            document.getElementById('conv-detail').textContent = diffText;
        }

        // Init
        function init() {
            const now = new Date();
            document.getElementById('conv-time').value = padZero(now.getHours()) + ':' + padZero(now.getMinutes());
            document.getElementById('conv-date').value = now.getFullYear() + '-' + padZero(now.getMonth()+1) + '-' + padZero(now.getDate());
            convertTime();
        }

        init();
    </script>
</body>
</html>
